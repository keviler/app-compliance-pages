<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App Compliance Pages</title>
  <style>
    :root {
      --bg: #fffdf6;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #f0e4be;
      --accent: #e8b746;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 0% 0%, #fff7df 0%, var(--bg) 45%, #fffef9 100%);
      min-height: 100vh;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 40px 20px 64px; }
    h1 { margin: 0 0 10px; font-size: 34px; }
    p { margin: 0; color: var(--muted); line-height: 1.7; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 28px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(232, 183, 70, 0.1);
    }
    .name { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    ul { margin: 0; padding-left: 20px; }
    li { margin: 8px 0; }
    a { color: #8c5e00; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .foot { margin-top: 26px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>App Compliance Pages</h1>
    <p>Public legal and support pages for App Store submission. Add a new folder per app for easy long-term maintenance.</p>

    <section class="grid">
      <article class="card">
        <div class="name">KeepIt</div>
        <ul>
          <li><a href="./keepit/privacy-policy.html">Privacy Policy</a></li>
          <li><a href="./keepit/support.html">Support</a></li>
        </ul>
      </article>
    </section>

    <div class="foot">Last updated: 2026-04-24</div>
  </main>
</body>
</html>
