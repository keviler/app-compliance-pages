<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>记账吧 - 技术支持</title>
  <style>
    :root {
      --bg: #fffdf6;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #f0e4be;
      --accent: #e8b746;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "PingFang SC", "Noto Sans CJK SC", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 0% 0%, #fff7df 0%, var(--bg) 45%, #fffef9 100%);
      min-height: 100vh;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 40px 20px 64px; }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(232, 183, 70, 0.1);
    }
    h1 { margin: 0 0 8px; font-size: 32px; }
    .meta { color: var(--muted); margin-bottom: 20px; }
    h2 {
      margin: 24px 0 10px;
      font-size: 20px;
      color: #8c5e00;
      border-left: 4px solid var(--accent);
      padding-left: 10px;
    }
    p, li { line-height: 1.8; color: #334155; }
    ul { margin: 0; padding-left: 20px; }
    .back { margin-top: 18px; display: inline-block; color: #8c5e00; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    a { color: #8c5e00; }
  </style>
</head>
<body>
  <main class="wrap">
    <article class="panel">
      <h1>记账吧技术支持</h1>
      <div class="meta">最后更新：2026-04-24</div>

      <p>如果你在使用中遇到问题，可以通过以下方式联系我们：</p>
      <ul>
        <li>支持邮箱：<a href="mailto:zpy910524@qq.com">zpy910524@qq.com</a></li>
      </ul>

      <h2>常见问题</h2>
      <h3>1) iCloud 同步失败</h3>
      <p>请确认设备已登录 iCloud，且应用内已开启 iCloud 同步功能。</p>

      <h3>2) 语音记账无法使用</h3>
      <p>请在系统设置中允许麦克风与语音识别权限。</p>

      <h3>3) Widget 未刷新</h3>
      <p>可尝试重新添加小组件，或新增一笔账单后等待小组件刷新。</p>

      <h3>4) 无法开启提醒</h3>
      <p>请检查系统通知权限与“勿扰/专注模式”设置。</p>

      <h2>响应时效</h2>
      <p>我们通常会在 1-3 个工作日内回复。</p>

      <a class="back" href="../index.html">返回首页</a>
    </article>
  </main>
</body>
</html>
